<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Coding — 多 Agent 协作台</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/collapsed-msg.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo" style="cursor:pointer;gap:8px;display:flex;align-items:center" onclick="backToStudio()" title="返回 OpenTeam Studio">
    <span style="font-size:11px;opacity:0.5">←</span>
    <span style="font-size:12px;opacity:0.6;font-weight:400">OpenTeam</span>
    <span style="opacity:0.3">/</span>
    <span id="activeTeamLabel">⬡ vibe<span style="font-weight:400;color:var(--text2)">-coding</span></span>
  </div>

  <!-- Team 切换 -->
  <div class="team-switcher" style="display:flex;align-items:center;gap:8px;margin-left:16px">
    <select id="teamSelector" onchange="switchTeam(this.value)" style="height:28px;padding:4px 8px;background:var(--bg3);border:1px solid var(--border3);border-radius:4px;color:var(--text1);font-size:12px;cursor:pointer">
      <option value="vibe-coding" selected>⬡ vibe-coding</option>
      <option value="research-team">🔬 research-team</option>
      <option value="business-team">💼 business-team</option>
    </select>
    <button class="btn-icon" onclick="prepareCurrentSession()" title="准备当前 Session">⚡</button>
  </div>

  <div class="project-tabs" id="projectTabs">
    <!-- 项目 tabs 将从 API 动态加载 -->
    <div class="proj-tab-add" onclick="addProject()" title="新建项目">+</div>
  </div>

  <div class="topbar-actions">
    <span id="connectionStatus" class="connection-status disconnected" title="未连接" style="font-size:10px;color:var(--red)">○</span>
    <div class="btn-icon" onclick="openSettings()" title="LLM 设置">⚙️</div>
    <div class="btn-icon" onclick="toggleSidebar()" title="切换文件栏">⊞</div>
    <div class="btn-icon" onclick="toggleRightPanel()" title="切换面板">⊟</div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌓</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- LEFT: File Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Files</span>
      <span style="font-size:10px;color:var(--text3);font-family:var(--mono)" id="currentProjectLabel">alpha</span>
    </div>
    <div class="file-tree" id="fileTree"></div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="agent-strip" id="agentStrip"></div>
    <div class="chat-area">
      <div class="chat-header">
        <span class="chat-title">💬 群聊</span>
        <button class="chat-clear-btn" onclick="clearChatMessages()" title="清空聊天">🗑️ 清空</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area" id="chatInputArea">
        <div class="chat-resize-handle" id="chatResizeHandle"></div>
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatInput" placeholder="发送消息… @dev-01 请开发 #T001" rows="2" onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
          <div class="chat-input-actions">
            <button class="send-btn" onclick="sendMessage()">发送 ↑</button>
          </div>
        </div>
      </div>
    </div>
    <div class="kbd-row">
      <span class="kbd-hint"><kbd>↑</kbd> 发送</span>
      <span class="kbd-hint"><kbd>@</kbd> 呼叫 Agent</span>
      <span class="kbd-hint"><kbd>#</kbd> 关联任务</span>
      <span class="kbd-hint"><kbd>Ctrl</kbd><kbd>S</kbd> 保存</span>
      <span class="kbd-hint"><kbd>Ctrl</kbd><kbd>B</kbd> 切换侧栏</span>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel" id="rightPanel">
    <div class="panel-tabs">
      <div class="panel-tab active" id="tab-thinking" onclick="switchTab('thinking')">Thinking</div>
      <div class="panel-tab" id="tab-editor" onclick="switchTab('editor')">Editor</div>
      <div class="panel-tab" id="tab-board" onclick="switchTab('board')">Board</div>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

<div class="notif" id="notif"></div>
<div class="toast-container" id="toastContainer"></div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <div class="context-menu-item" onclick="contextAction('open')">📂 打开</div>
  <div class="context-menu-sep"></div>
  <div class="context-menu-item" onclick="contextAction('newFile')">📄 新建文件</div>
  <div class="context-menu-item" onclick="contextAction('newFolder')">📁 新建文件夹</div>
  <div class="context-menu-sep"></div>
  <div class="context-menu-item" onclick="contextAction('rename')">✏️ 重命名</div>
  <div class="context-menu-item danger" onclick="contextAction('delete')">🗑️ 删除</div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">⚙️ LLM 设置</span>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div class="modal-body">
      <div class="status-indicator" id="llmStatus">
        <span id="llmStatusIcon">●</span>
        <span id="llmStatusText">未配置</span>
      </div>
      <div class="form-group">
        <label class="form-label">Base URL</label>
        <input type="text" class="form-input" id="llmBaseUrl" placeholder="http://localhost:11434/v1">
      </div>
      <div class="form-group">
        <label class="form-label">API Key</label>
        <input type="password" class="form-input" id="llmApiKey" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label class="form-label">Model Name</label>
        <input type="text" class="form-input" id="llmModelName" placeholder="gpt-4">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
      <button class="btn btn-secondary" onclick="testLLMConnection()">测试</button>
      <button class="btn btn-primary" onclick="saveLLMSettings()">保存</button>
    </div>
  </div>
</div>

<!-- JS Modules -->
<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<!-- Component Modules (拆分自 components.js) -->
<script src="js/components/chat.js"></script>
<script src="js/components/agents.js"></script>
<script src="js/components/files.js"></script>
<script src="js/components/panel.js"></script>
<script src="js/components/private-chat.js"></script>
<script src="js/components/index.js"></script>
<script src="js/app.js"></script>
<script>
// Fallback: ensure app.js initialized correctly
// Wait for all scripts to load before checking
window.addEventListener('load', function() {
  // Small delay to ensure app.js has executed
  setTimeout(function() {
    if (typeof window.sendMessage !== 'function') {
      console.warn('[dashboard.html] app.js not initialized, calling init...');
      try {
        // Try to initialize manually
        if (typeof COMPONENTS !== 'undefined' && typeof API !== 'undefined') {
          loadTheme();
          COMPONENTS.renderChatMessages();
          COMPONENTS.renderAgentStrip();
          COMPONENTS.renderFileTree();
          COMPONENTS.renderPanel();
          API.connectWebSocket();
          console.log('[dashboard.html] Manual init complete');
        }
      } catch (e) {
        console.error('[dashboard.html] Manual init failed:', e);
      }
    }
  }, 100);
});
</script>
</body>
</html>
